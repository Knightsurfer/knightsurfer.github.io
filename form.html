  <html>
  

    <head>
		<!-- Header Content -->

		<style type="text/css">
		body {text-align:left;}

    <body>	
	
	
		<!-- JavaScript -->
		<script type="text/javascript">
				function sellsoul(name,password,gender,country)
				{
				
					return("Your name is " + name);
				}
				
				function signup(name,password,gender,country)
				{
				
					alert("Your name is " + name + "\n" + "Your password is " + password + "\n" + "You are " + gender + "\n" + "you live in " + country);
					
	
					
				}
				
				
		</script>
	
	
	
	
		<!-- Body Content -->
		<h1>Sign Up</h1><hr>
		<form action="file:///C:/Users/armst/Documents/Website/knightsurfer.github.io/index.html" method="post">
		
		
			<strong>Username:</strong> <input type="text" name="username"/><br>
			<strong>Password:</strong> <input type="password" name="password"/><br><br>
			
			<strong>Gender:</strong>  <input type="radio" name="gender" value="male"/>  Male
			<input type="radio" name="gender" value="female"/>Female <br><br>
			
			<strong><p>What types of games do you like to play?:</p></strong>
			Platformer <input type="checkbox" name="gameplay" value="Platformer"/><br>
			Role Playing Games <input type="checkbox" name="gameplay" value="RPG"/><br>
			Real Time Stratedgy <input type="checkbox" name="gameplay" value="RTS"/><br><br>
			
			
			<strong>Country:</strong> <select name="country">
						<option value="null"></option>		
						<option value="UK">United Kingdom</option>			
						<option value="US">United States</option>	
					</select><br><br>
					
					
			<strong><p>Tell us about yourself:</p></strong>
			<textarea name="bio" rows="8" cols="20"></textarea>
			</br>
			<strong><p>Profile Picture:</p></strong>
			<input type="file" name="file"/><br><br>
			
			<input type="submit" value="Sign Up" name="submit"></input>
			<input type="button" value="Sign Up 2" onclick="signup(username.value,password.value,gender.value,country.value)">
				
			<input type="button" value="Sell Your Soul!" onclick="sellsoul(username.value)">
			
				
			
		</form><br>

		
		
		
	</body>
